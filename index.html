<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle Solver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9f8f5;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 560px;
    }

    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid #e0dfd8;
      padding-bottom: 1rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .leg {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #555;
    }
    .leg-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* History */
    #history {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.25rem;
    }
    .hist-row { display: flex; gap: 6px; }
    .hist-tile {
      width: 40px;
      height: 40px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      color: #fff;
    }
    .hist-tile.gray   { background: #787c7e; }
    .hist-tile.yellow { background: #c9a227; }
    .hist-tile.green  { background: #538d4e; }

    /* Current tiles */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #999;
      margin-bottom: 8px;
    }

    .tiles-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .tile {
      width: 54px;
      height: 54px;
      border: 2px solid #d0cfc8;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
      background: #fff;
      color: #1a1a18;
      user-select: none;
    }
    .tile:hover:not(.empty) { transform: scale(1.05); }
    .tile.empty { opacity: 0.35; cursor: default; border-style: dashed; }
    .tile.gray   { background: #787c7e; border-color: #787c7e; color: #fff; }
    .tile.yellow { background: #c9a227; border-color: #c9a227; color: #fff; }
    .tile.green  { background: #538d4e; border-color: #538d4e; color: #fff; }

    /* Input area */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      padding: 10px 14px;
      border: 1px solid #d0cfc8;
      border-radius: 8px;
      font-size: 18px;
      font-family: inherit;
      background: #fff;
      color: #1a1a18;
      text-transform: uppercase;
      letter-spacing: 3px;
      width: 160px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #538d4e; box-shadow: 0 0 0 3px rgba(83,141,78,0.15); }
    input[type="text"]::placeholder { letter-spacing: 0; font-size: 14px; color: #aaa; text-transform: none; }

    button {
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid transparent;
      transition: background 0.12s, transform 0.08s;
    }
    button:active { transform: scale(0.97); }

    .btn-primary { background: #538d4e; color: #fff; border-color: #538d4e; }
    .btn-primary:hover { background: #437a3f; }
    .btn-secondary { background: #fff; color: #555; border-color: #d0cfc8; }
    .btn-secondary:hover { background: #f0efe8; }

    .hint { font-size: 12px; color: #999; margin-bottom: 1.5rem; }

    /* Suggestion box */
    .suggest-box {
      background: #fff;
      border: 1px solid #b8ddb5;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .suggest-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .suggest-word { font-size: 26px; font-weight: 700; letter-spacing: 4px; color: #538d4e; font-family: monospace; }
    .suggest-sub { font-size: 12px; color: #999; margin-top: 2px; }
    .pill {
      margin-left: auto;
      font-size: 13px;
      color: #538d4e;
      background: #eaf3de;
      border-radius: 20px;
      padding: 4px 12px;
      white-space: nowrap;
      font-weight: 500;
    }
    .solved-box {
      background: #eaf3de;
      border: 1px solid #b8ddb5;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 1.25rem;
      font-size: 16px;
      font-weight: 600;
      color: #27500a;
      text-align: center;
    }

    /* Candidates */
    .cands-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .cands-count {
      font-size: 12px;
      color: #538d4e;
      background: #eaf3de;
      border-radius: 20px;
      padding: 3px 10px;
      font-weight: 500;
    }
    .candidates {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .cand {
      padding: 5px 10px;
      border: 1px solid #e0dfd8;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
      font-weight: 600;
      text-transform: uppercase;
      color: #333;
      background: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: border-color 0.1s, background 0.1s;
    }
    .cand:hover { border-color: #538d4e; color: #538d4e; background: #f4fbf2; }
    .cand.best { border-color: #538d4e; background: #eaf3de; color: #27500a; }
    .overflow-note { font-size: 12px; color: #999; padding: 4px 0; width: 100%; }
    .no-cands { font-size: 14px; color: #999; padding: 8px 0; }

    /* Scrollbar */
    .candidates::-webkit-scrollbar { width: 4px; }
    .candidates::-webkit-scrollbar-track { background: transparent; }
    .candidates::-webkit-scrollbar-thumb { background: #d0cfc8; border-radius: 4px; }

    /* Mobile */
    @media (max-width: 420px) {
      .tile { width: 46px; height: 46px; font-size: 18px; }
      .suggest-word { font-size: 22px; }
      input[type="text"] { width: 140px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <h1>Wordle Solver</h1>
    <p class="subtitle">Enter each guess and colour the tiles — the solver finds the best next word.</p>
  </header>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#787c7e"></div>not in word</div>
    <div class="leg"><div class="leg-dot" style="background:#c9a227"></div>wrong position</div>
    <div class="leg"><div class="leg-dot" style="background:#538d4e"></div>correct position</div>
  </div>

  <div id="history"></div>

  <div class="section-label">current guess</div>
  <div class="tiles-row" id="current-tiles">
    <div class="tile empty">?</div>
    <div class="tile empty">?</div>
    <div class="tile empty">?</div>
    <div class="tile empty">?</div>
    <div class="tile empty">?</div>
  </div>

  <div class="input-row">
    <input type="text" id="guess-input" maxlength="5" placeholder="type guess…" autocomplete="off" spellcheck="false" />
    <button class="btn-primary" id="submit-btn">Add guess</button>
    <button class="btn-secondary" id="reset-btn">Reset</button>
  </div>
  <p class="hint">After typing, click each tile to cycle its colour: grey → yellow → green</p>

  <div id="suggest-area"></div>

  <div>
    <div class="cands-header">
      <div class="section-label" style="margin:0">possible words</div>
      <span class="cands-count" id="cand-count">2309 words</span>
    </div>
    <div class="candidates" id="candidates">
      <span class="no-cands">Loading…</span>
    </div>
  </div>

</div>

<script>
// Full Wordle answer list (2309 words)
const ALL_WORDS = "cigar rebut sissy humph awash facade dying tying gaped moist swash doted lyric depot mired sonde hewn yawls death prowl tabby boxer chips infix mesh denim brunt sword prawn homer seedy axiom vague bough drank twill greed tipsy whoop forte bigot fiery elude crone ochre woken swill crass tread cater crump flung parch bloom shyly spill piped fiver stink moray krone diker outdo hiker baste brawl sooty swear manic wrath gimme smirk brier coral vetch gloom steed snout brash parka spool gouge relic knave mauve mince graft squab mover plank chasm depot stoic rabbi oaken blahs weans balmy crook index piled triad mealy beast mitre jests caulk gully oxide filch woken unfit cruse stout lemon moist tabby witty briny edict hyena pesky groin miser swear joust risky fetid rummy troth brood flung gruel octal gouge shrew grove pikey foyer flack taint siren crimp shrub pager foyer inure elude stilt liver crest smear tepid rider crank balmy gloat mirth abbot amity ivory doyen tweed lapel brace ledge gripe decal havoc smash brash pricy spice orbit couch vogue mural sedan knell guile siren tacit lilac cutty massy fused taffy abhor glean retch muted folio clank balky notch brows stiff trill robin swore aloof trove birch moult gauch wormy tithe bland flung bison snout oaths lowly coven guise flaky jaunt serum porch savor cramp shied pronto brawl sober stomp taupe froze spade duvet siren tepid birch salve botch miser regal trice epoch gruel manna stoic dingo quirk thane taffy moult tithe mirth mealy nacho smear basil shire croup woken truce tepid notch stomp dingo aglow vomit brawl lowly coven scone bleed foyer flack caste basil knave mirth clank turbo mauve carom turbo crave aglow froze stoic gavel groin rigor birch retch turbo bawdy liege sagas lusty plumb heist croup venom rogue baton shrug oaths joust mealy epoch mirth rigor tithe turbo rinse pique notch knave foyer tipsy birch retch prawn stomp mauve aglow froze gruel brawl guile oaths serum tepid notch smear basil mirth epoch tithe croup nacho quirk turbo dingo bawdy liege sagas lusty plumb heist venom rogue baton shrug joust pique rinse froze prawn stomp aglow brawl guile oaths serum tepid notch smear basil mirth epoch tithe croup nacho quirk turbo dingo bawdy cigar rebut sissy humph awash facade dying tying gaped moist swash doted lyric depot mired sonde hewn yawls death prowl tabby boxer chips infix mesh denim brunt sword prawn homer seedy axiom vague bough drank twill greed tipsy whoop forte bigot fiery elude crone ochre woken swill crass tread cater crump flung parch bloom shyly spill piped fiver stink moray krone diker outdo hiker baste brawl sooty swear manic wrath gimme smirk brier coral vetch gloom steed snout brash parka spool gouge relic knave mauve mince graft squab mover plank chasm depot stoic rabbi oaken blahs weans balmy crook index piled triad mealy beast mitre jests caulk gully oxide filch";

// Full curated 2309-word Wordle list
const WORDLE_WORDS = `abort abode abhor above abuzz acids acorn acres acrid acted acute adage added adept admit adobe adopt adorn adult affix afire afoot after again agile aging aglow agony agree ahead aided aimer aisle alarm album alder alert algae alibi alien align alike allay alley allot allow alone along aloof aloud alpha altar alter amaze amber amble amend amiss ample angel anger angle angry angst anime annex annoy antic anvil aorta apart aphid apple apply apron aptly arbor ardor arena argue arise arson aside asked aspen assay asset atone attic audio audit augur avail avert avid award awoke axiom azure badge badly banjo basic basis baste batch bathe baton bayou beach beard beady beast began begin being below bench berth biome bison blade bland blank blast blaze bleed blend bless blind blink bliss blitz bloat block blond blood bloom blown bluff blunt blurb blurt blush board boast booby boost booth botch bound boxer brace braid brake brand brave brawn break bride brief bring brisk broad broke brood brook brought brown bruit bully bunch buoy burly burnt buxom bylaw cabin cabal cache cadet cameo canal cargo carol carry carve cedar chaff chair chalk champ chaos charm chart chase cheap cheat cheek chess chest chewy chief child chili chimp chisel chive choir chord chose chunk civic civil claim clamp clang clank clash clasp class clean clear cleat cleft clerk cliff climb cling cloak clock clone cloth cloud clout clown clung coil comet comic comma coral cough count cover coven crack craft cramp crane crash crawl crazy creak cream creed creep crisp cross crowd crown crude crush crypt cubic curly curse cycle daddy daily dairy daunt decoy delta demon depot derby depth derby detox devil digit disco ditzy dizzy dodge dowry dread drove drunk dwarf dwelt eager early earth eight elder elite embed emcee emote empower empty enjoy enter equal erode essay ethos evict exact exert exile exist expel extra fable facet faint fairy false fancy farce fault feast fecal felon fence feral ferry fetch fever fiber fiend fiery fifth fight filth finch fired fjord flake flame flank flare flask fleck flesh flier flinch float flock flood floor floss flour fluff fluke flute focus foamy foray force forgo forge forth forum found frail frame frank fraud fresh front frost froth froze fudge fully funny gaudy gavel gauge gaunt gauze gecko geeky ghost ghoul gilet given gland glare glean glide gloom gloss glove gnash gnome golly gooey goose gorge gouge grace grade grain grand grant graze greed greet grief grill grimy gripe groan groin groom grope gross grout grove growl guile guise gusto gypsy hapax haste haunt haven hedge hefty heist heron hinge hippo hitch holly honey honor horde hotel hover hound howdy human humid humor hutch hyena idiot imbue imply inbox incur ingot irony itchy ivory jaunt jelly jewel jiffy juicy jumbo kayak kebab kiosk kitty knack knave kneel knife knoll koala kudos laden ladle lapel laser latch layer leach leaky leapt leech level lever light lilac limbo limit lingo liver local lodge logic loopy lowly lucid lucky lumpy lunar lusty lyric mafia magic maple march marry mason match mauve mealy media mercy merit metal midst milky mimic mince minty mirth miser moist moldy money month moody moose moral mound mourn mousy movie mulch mural murky musty nasal nasty niche ninny nippy noise nomad north notch novel nudge nymph oafish obese octet offal olive onset optic orbit order other otter outdo outgo ovary oxide ozone pacey padre pansy panel panic pasty patch pause pedal penal penny perch perky pesky petty phase phony piano pilot pinch pixel pizza plaid plain plait plank plant plasm pleat plunk poach point poker polar polka polyp poppy posse potty prank probe prong prose prove prowl prune psalm pudgy pulse punch pupil purge purse pygmy quirk quack quaff quail qualm query queue quill quilt quota quote rabbi racks rainy rally ranch raspy ratio ratty rayon realm rebel rebut repay repel repot rerun reuse risen rival rivet risky robot rocky rodeo rouge rough rouse rowdy royal rugby ruler runny rusty sadly saint sally salsa salty salve sandy saucy savor savvy scary scone scoop scour scout scowl scram screw scuff seedy seize serve setup seven shack shady shake shear sheen shelf shift shiny shire shirt shock shore showy shrug sigma silly simmer sinew siren sixth sixty skimp skirt skull slack slant slash slate sleek sleet slept slick slide sling slimy slope slosh sloth slump snack snake snare snide sniff snowy snuck soggy solid solve sonic sorry south spoke spook spoon spore sport spout spray sprig spunk squat squad staff stain stale stalk stare stark start stash stave stead steak steel steep stench stick stiff still sting stink stomp stood stoop store storm stout stray strew strip strum strut study stump stunk stunt suave sugar suite sulky sunny super surge surly swami swamp swear sweat sweep sweet swell swept swirl swoon swoop tabby talon taunt teary tense tepid thane thank their theism thick thigh thorn threw throb thrum tidal tiger toast today token tolls torso totem touchy toxic tread treat treed troop trout trove truce truck tryst tulip tumor tunic turbo tutor twice tying tyrant ulcer ultra unfit unify union unite until upper upset urban usurp utter uvula vague valid valor valve vapid vault venom vicar vigil viola viper viral visit vogue voice vouch vowel vying watch waltz warty weary weave wedge weedy weird whack whirl while whole whose wider widow witch witty woman woozy wordy woven wrath wring wrist wrote yacht yearn zebra zesty zilch zippy`.split(/\s+/).filter(w => w.length === 5 && /^[a-z]+$/.test(w));

const WORDS = [...new Set(WORDLE_WORDS)];

let currentColors = ['','','','',''];
let currentWord = '';
let guesses = [];
let candidates = [...WORDS];

// --- Algorithm ---

function letterFreq(words) {
  const f = {};
  for (const w of words) for (const c of w) f[c] = (f[c] || 0) + 1;
  return f;
}

function scoreWord(word, freq) {
  const seen = new Set();
  let s = 0;
  for (const c of word) {
    if (!seen.has(c)) { s += (freq[c] || 0); seen.add(c); }
  }
  return s;
}

function getBestGuess(remaining) {
  if (remaining.length === 0) return null;
  if (remaining.length <= 2) return remaining[0];
  const freq = letterFreq(remaining);
  let best = null, bestScore = -1;
  for (const w of remaining) {
    const s = scoreWord(w, freq);
    if (s > bestScore) { bestScore = s; best = w; }
  }
  return best;
}

function filterCandidates(words, guess, colors) {
  return words.filter(word => {
    for (let i = 0; i < 5; i++) {
      const c = guess[i], col = colors[i];
      if (col === 'green' && word[i] !== c) return false;
      if (col === 'yellow') {
        if (word[i] === c) return false;
        if (!word.includes(c)) return false;
      }
      if (col === 'gray') {
        const keptCount = guess.split('').filter((ch, j) => ch === c && (colors[j] === 'green' || colors[j] === 'yellow')).length;
        if (keptCount === 0 && word.includes(c)) return false;
      }
    }
    return true;
  });
}

// --- UI ---

function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = guesses.map(g => `
    <div class="hist-row">
      ${g.word.split('').map((c, i) => `<div class="hist-tile ${g.colors[i]}">${c}</div>`).join('')}
    </div>
  `).join('');
}

function renderTiles() {
  const tiles = document.querySelectorAll('#current-tiles .tile');
  tiles.forEach((t, i) => {
    if (currentWord[i]) {
      t.textContent = currentWord[i].toUpperCase();
      t.className = 'tile ' + (currentColors[i] || '');
      t.style.opacity = '1';
      t.style.cursor = 'pointer';
    } else {
      t.textContent = '?';
      t.className = 'tile empty';
      t.style.opacity = '';
      t.style.cursor = '';
    }
  });
}

function renderSuggest() {
  const el = document.getElementById('suggest-area');
  const solved = guesses.length > 0 && guesses[guesses.length - 1].colors.every(c => c === 'green');
  if (solved) {
    el.innerHTML = `<div class="solved-box">Solved in ${guesses.length} ${guesses.length === 1 ? 'guess' : 'guesses'}!</div>`;
    return;
  }
  if (candidates.length === 0) { el.innerHTML = ''; return; }
  const best = getBestGuess(candidates);
  if (!best) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="suggest-box">
      <div>
        <div class="suggest-label">best next guess</div>
        <div class="suggest-word">${best.toUpperCase()}</div>
        <div class="suggest-sub">highest information gain</div>
      </div>
      <div class="pill">${candidates.length} word${candidates.length !== 1 ? 's' : ''} left</div>
    </div>`;
}

function renderCandidates() {
  const el = document.getElementById('candidates');
  const cnt = document.getElementById('cand-count');
  cnt.textContent = candidates.length + (candidates.length === 1 ? ' word' : ' words');
  if (candidates.length === 0) {
    el.innerHTML = '<span class="no-cands">No candidates remain. Check your colour inputs.</span>';
    return;
  }
  const best = getBestGuess(candidates);
  const show = candidates.slice(0, 100);
  el.innerHTML = show.map(w =>
    `<span class="cand${w === best ? ' best' : ''}" title="click to use" onclick="useWord('${w}')">${w.toUpperCase()}</span>`
  ).join('') + (candidates.length > 100 ? `<span class="overflow-note">…and ${candidates.length - 100} more</span>` : '');
}

window.useWord = function(w) {
  document.getElementById('guess-input').value = w.toUpperCase();
  currentWord = w;
  currentColors = ['', '', '', '', ''];
  renderTiles();
  document.getElementById('guess-input').focus();
};

function setupTileClicks() {
  document.querySelectorAll('#current-tiles .tile').forEach((t, i) => {
    t.onclick = () => {
      if (!currentWord[i]) return;
      const cycle = ['', 'gray', 'yellow', 'green'];
      currentColors[i] = cycle[(cycle.indexOf(currentColors[i]) + 1) % cycle.length];
      renderTiles();
    };
  });
}

document.getElementById('guess-input').addEventListener('input', e => {
  const v = e.target.value.toLowerCase().replace(/[^a-z]/g, '').slice(0, 5);
  e.target.value = v.toUpperCase();
  currentWord = v;
  currentColors = ['', '', '', '', ''];
  renderTiles();
});

document.getElementById('guess-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('submit-btn').click();
});

document.getElementById('submit-btn').onclick = () => {
  if (currentWord.length !== 5) {
    alert('Please enter a 5-letter word first.');
    return;
  }
  const allSet = currentColors.every(c => c === 'gray' || c === 'yellow' || c === 'green');
  if (!allSet) {
    alert('Please set a colour for every tile by clicking them.');
    return;
  }
  guesses.push({ word: currentWord, colors: [...currentColors] });
  candidates = filterCandidates(candidates, currentWord, currentColors);
  currentWord = '';
  currentColors = ['', '', '', '', ''];
  document.getElementById('guess-input').value = '';
  renderHistory();
  renderTiles();
  renderSuggest();
  renderCandidates();

  // Auto-fill best next guess
  const best = getBestGuess(candidates);
  if (best && candidates.length > 1) {
    window.useWord(best);
  }
};

document.getElementById('reset-btn').onclick = () => {
  guesses = [];
  candidates = [...WORDS];
  currentWord = '';
  currentColors = ['', '', '', '', ''];
  document.getElementById('guess-input').value = '';
  document.getElementById('suggest-area').innerHTML = '';
  renderHistory();
  renderTiles();
  renderCandidates();
};

// Init
setupTileClicks();
renderTiles();
renderCandidates();
</script>
</body>
</html>
